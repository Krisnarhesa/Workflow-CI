name: MLflow CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "MLProject/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  MLFLOW_VERSION: "2.19.0"

jobs:
  train-model:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Run actions/checkout@v4
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check Env
        run: |
          python --version
          pip --version
          echo "Python environment ready"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==${{ env.MLFLOW_VERSION }}
          pip install scikit-learn==1.8.0 pandas==2.3.3 numpy==1.26.4 scipy==1.17.1
          pip install cloudpickle==3.1.2 pyarrow==15.0.2
          pip install matplotlib seaborn dagshub>=0.2.0

      - name: Run mlflow project
        working-directory: MLProject
        env:
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_USER_TOKEN }}
        run: |
          echo "Starting MLflow training..."
          mlflow run . -e train --env-manager=local

      - name: Get latest MLflow run_id
        id: mlflow_run
        run: |
          if [ -f MLProject/run_id.txt ]; then
            RUN_ID=$(cat MLProject/run_id.txt)
            echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
            echo "Latest MLflow run_id: $RUN_ID"
          else
            echo "run_id=unknown" >> $GITHUB_OUTPUT
            echo "run_id.txt not found"
          fi

      - name: Install Python dependencies
        run: |
          pip install python-dotenv

      - name: Check training changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain MLProject/artifacts/) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload to GitHub
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add MLProject/artifacts/*.png || true
          git add MLProject/artifacts/*.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[CI] Update model artifacts - Run #${{ github.run_number }}"
            git push || echo "Push failed"
          fi
        continue-on-error: true

      - name: Build Docker Model
        continue-on-error: true
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/Krisnarhesa/machine-learning-models.mlflow
          MLFLOW_TRACKING_USERNAME: Krisnarhesa
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_USER_TOKEN }}
        run: |
          echo "Building Docker model..."
          if [ -f MLProject/run_id.txt ]; then
            RUN_ID=$(cat MLProject/run_id.txt)
            echo "Using run_id: $RUN_ID"
            mlflow models build-docker -m "runs:/$RUN_ID/model" -n mlflow-churn-model:${{ github.run_id }} || echo "Docker build skipped"
          else
            echo "No run_id found, skipping Docker build"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Tag Docker image
        continue-on-error: true
        run: |
          docker tag mlflow-churn-model:${{ github.run_id }} ${{ secrets.DOCKERHUB_USERNAME }}/mlflow-churn-model:latest || true

      - name: Push Docker Image
        continue-on-error: true
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlflow-churn-model:latest || echo "Docker push skipped"

      - name: Post Log in to Docker Hub
        if: always()
        run: |
          docker logout || true
